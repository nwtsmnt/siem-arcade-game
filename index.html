<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>SYSTEM BREACH // Arcade Protocol</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/game.css">
</head>
<body>
  <!-- Login Screen -->
  <div id="login-screen">
    <div id="login-box">
      <div id="login-title">SYSTEM BREACH</div>
      <div id="login-subtitle">// AUTHENTICATION REQUIRED //</div>
      <div id="login-form">
        <div class="login-field">
          <label for="login-username">USERNAME:</label>
          <input type="text" id="login-username" autocomplete="username" maxlength="30" spellcheck="false">
        </div>
        <div class="login-field">
          <label for="login-password">PASSWORD:</label>
          <input type="password" id="login-password" autocomplete="current-password" maxlength="64">
        </div>
        <div id="login-error" class="hidden"></div>
        <div id="login-success" class="hidden"></div>
        <button id="login-btn">AUTHENTICATE</button>
        <div id="login-hint">New username? Account will be created automatically.</div>
      </div>
    </div>
  </div>

  <div id="game-wrapper" class="hidden">
    <canvas id="game-canvas" width="1000" height="650"></canvas>

    <div id="hud">
      <div id="hud-left">
        <span id="hud-score">SCORE: 0</span>
        <span id="hud-lives"></span>
      </div>
      <div id="hud-right">
        <span id="hud-rank">RANK: BRONZE</span>
        <span id="hud-session" title="Session ID"></span>
        <button id="logout-btn" title="Log out">LOGOUT</button>
      </div>
    </div>

    <div id="mission-text" class="hidden"></div>

    <div id="controls-legend" class="hidden">
      <span>[WASD] MOVE</span>
      <span>[SPACE] FIRE</span>
      <span>[Q] SHOCKWAVE</span>
      <span>[E] INTERACT</span>
      <span>[ESC] PAUSE</span>
    </div>

    <div id="log-export">
      <button id="export-btn" title="Export SIEM Logs (NDJSON)">
        EXPORT LOGS <span id="log-count-badge">0</span>
      </button>
    </div>

    <div id="terminal-overlay" class="hidden">
      <div id="terminal-content">
        <div id="terminal-header">DATA TERMINAL</div>
        <div id="terminal-body"></div>
        <div id="terminal-footer">[ESC] or [E] to close</div>
      </div>
    </div>

    <div id="touch-controls" class="hidden">
      <div id="joystick-zone">
        <div id="joystick-base">
          <div id="joystick-knob"></div>
        </div>
      </div>
      <div id="touch-actions">
        <button class="touch-btn touch-small touch-pause" data-key="escape">| |</button>
        <button class="touch-btn touch-small" data-key="e">E</button>
        <button class="touch-btn touch-small" data-key="q">Q</button>
        <button class="touch-btn touch-fire" data-key=" ">FIRE</button>
      </div>
    </div>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
