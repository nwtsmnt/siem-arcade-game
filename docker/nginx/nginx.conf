worker_processes auto;
events { worker_connections 2048; }

http {
    upstream graylog_web {
        least_conn;
        server 127.0.0.1:9001 max_fails=2 fail_timeout=15s;
        server 127.0.0.1:9002 max_fails=2 fail_timeout=15s;
    }

    # GELF HTTP inputs — one per Graylog node on unique ports; LB round-robin
    upstream graylog_gelf {
        least_conn;
        server 127.0.0.1:12211 max_fails=2 fail_timeout=15s;
        server 127.0.0.1:12212 max_fails=2 fail_timeout=15s;
    }

    # Graylog Web UI + REST API (externally reachable)
    server {
        listen 0.0.0.0:9000;
        server_name _;

        client_max_body_size 10m;
        proxy_read_timeout 90s;

        location / {
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Server $host;
            proxy_set_header X-Graylog-Server-URL http://$host:9000/;
            proxy_pass http://graylog_web;
        }
    }

    # GELF HTTP input (externally reachable — load balances to both Graylog nodes)
    server {
        listen 0.0.0.0:12201;
        server_name _;

        client_max_body_size 1m;
        proxy_read_timeout 30s;

        location / {
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_pass http://graylog_gelf;
        }
    }
}
