worker_processes auto;
events { worker_connections 4096; }

# ─── Stream (TCP) LB for GELF TCP input — high-volume ingestion path ──────
stream {
    # Round-robin (default) balances new TCP connections 50/50 across
    # both Graylog nodes. `least_conn` here races and pins most workers
    # to one node because all workers connect at approximately the same
    # moment on load-test start.
    upstream graylog_gelf_tcp {
        server 127.0.0.1:12221 max_fails=2 fail_timeout=15s;
        server 127.0.0.1:12222 max_fails=2 fail_timeout=15s;
    }

    server {
        listen 0.0.0.0:12202;
        proxy_pass graylog_gelf_tcp;
        proxy_connect_timeout 5s;
        proxy_timeout         60s;
        proxy_socket_keepalive on;
    }
}

http {
    upstream graylog_web {
        least_conn;
        server 127.0.0.1:9001 max_fails=2 fail_timeout=15s;
        server 127.0.0.1:9002 max_fails=2 fail_timeout=15s;
    }

    # GELF HTTP inputs — one per Graylog node. Round-robin (default) so
    # keep-alive clients don't pin all traffic to the fastest backend,
    # which least_conn does when one node responds quicker than the other.
    upstream graylog_gelf {
        server 127.0.0.1:12211 max_fails=2 fail_timeout=15s;
        server 127.0.0.1:12212 max_fails=2 fail_timeout=15s;
    }

    # Graylog Web UI + REST API (externally reachable)
    server {
        listen 0.0.0.0:9000;
        server_name _;

        client_max_body_size 10m;
        proxy_read_timeout 90s;

        location / {
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Server $host;
            proxy_set_header X-Graylog-Server-URL http://$host:9000/;
            proxy_pass http://graylog_web;
        }
    }

    # GELF HTTP input (externally reachable — load balances to both Graylog nodes)
    server {
        listen 0.0.0.0:12201;
        server_name _;

        client_max_body_size 1m;
        proxy_read_timeout 30s;

        location / {
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_pass http://graylog_gelf;
        }
    }
}
